name: vibedeploy
region: nyc

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

ingress:
  rules:
    # API endpoints → backend
    - component:
        name: api
      match:
        path:
          prefix: /api
    - component:
        name: api
      match:
        path:
          prefix: /run
    - component:
        name: api
      match:
        path:
          prefix: /resume
    - component:
        name: api
      match:
        path:
          prefix: /health
    # Dashboard API endpoints → backend
    - component:
        name: api
      match:
        path:
          prefix: /dashboard/stats
    - component:
        name: api
      match:
        path:
          prefix: /dashboard/results
    - component:
        name: api
      match:
        path:
          prefix: /dashboard/brainstorms
    - component:
        name: api
      match:
        path:
          prefix: /dashboard/active
    - component:
        name: api
      match:
        path:
          prefix: /dashboard/events
    - component:
        name: api
      match:
        path:
          prefix: /dashboard/deployments
    # Everything else → frontend (Next.js handles its own routing)
    - component:
        name: web
      match:
        path:
          prefix: /

services:
  - name: api
    environment_slug: python
    github:
      repo: Two-Weeks-Team/vibeDeploy
      branch: main
      deploy_on_push: true
    source_dir: agent
    http_port: 8080
    instance_count: 1
    instance_size_slug: professional-xs
    build_command: pip install -r requirements.txt
    run_command: python run_server.py
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: ENC[REPLACE_WITH_DB_URL]
      - key: DIGITALOCEAN_INFERENCE_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_WITH_MODEL_ACCESS_KEY
      - key: DIGITALOCEAN_API_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_WITH_API_TOKEN
      - key: GITHUB_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_WITH_GITHUB_TOKEN
      - key: GITHUB_ORG
        scope: RUN_TIME
        value: Two-Weeks-Team
      - key: DO_KNOWLEDGE_BASE_ID
        scope: RUN_TIME
        value: REPLACE_WITH_KB_ID

  - name: web
    environment_slug: node-js
    github:
      repo: Two-Weeks-Team/vibeDeploy
      branch: main
      deploy_on_push: true
    source_dir: web
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    build_command: npm install && npm run build && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public
    run_command: node .next/standalone/server.js
    envs:
      - key: NEXT_PUBLIC_AGENT_URL
        scope: BUILD_TIME
        value: ${APP_URL}
      - key: PORT
        scope: RUN_TIME
        value: "3000"
      - key: HOSTNAME
        scope: RUN_TIME
        value: "0.0.0.0"
